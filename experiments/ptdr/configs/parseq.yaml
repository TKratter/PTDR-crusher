experiment_name: ptdr-parseq-scene
repo_root: .
dataset_root: dataset/recognition
include_domains:
  - indoor_text
  - outdoor_text

manifests_dir: experiments/ptdr/manifests/parseq_scene
val_ratio: 0.1
split_seed: 42
fail_on_bad_annotations: false
lmdb_map_size_gb: 8.0
extra_train_dataset_roots: []

external_datasets:
  icdar2019_mlt: null
  evarest_detection: null
  evarest_recognition: null
  totaltext: null
  ctw1500: null
  textocr: null
  ir_lpr_detection: null
  ir_lpr_recognition: null

train_mix:
  ptdr: 1.0
  icdar2019_mlt: 0.0
  evarest: 0.0
  totaltext: 0.0
  ctw1500: 0.0
  textocr: 0.0
  ir_lpr: 0.0
  min_ptdr_fraction: 0.3

mlt:
  scripts:
    - Arabic
    - Latin

model:
  name: parseq
  pretrained: true
  img_size: [32, 128]
  max_label_length: null

training:
  work_dir: work_dirs/parseq_ptdr_scene
  seed: 42
  batch_size: 128
  num_workers: 8
  max_epochs: 20
  accelerator: auto
  devices: 1
  precision: 16-mixed
  log_every_n_steps: 25
  accumulate_grad_batches: 1
  gradient_clip_val: 1.0
  lr: 0.001
  warmup_pct: 0.075
  weight_decay: 0.0
  resume_from_checkpoint: null

data:
  augment: true
  remove_whitespace: false
  normalize_unicode: false
  min_image_dim: 0
  rotation: 0
  collate_fn: null

wandb:
  enabled: true
  mode: online
  project: ptdr-ocr
  entity: null
  group: parseq
  job_type: train
  run_name: null
  tags:
    - ptdr
    - parseq
    - recognition
