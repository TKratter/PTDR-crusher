experiment_name: ptdr-dbnetpp-scene
repo_root: .
dataset_root: dataset/detection
include_domains:
  - indoor_text
  - outdoor_text

manifests_dir: experiments/ptdr/manifests/dbnetpp_scene
val_ratio: 0.1
split_seed: 42
fail_on_bad_annotations: false

external_datasets:
  icdar2019_mlt: null
  evarest_detection: null
  evarest_recognition: null
  totaltext: null
  ctw1500: null
  textocr: null
  ir_lpr_detection: null
  ir_lpr_recognition: null

train_mix:
  ptdr: 1.0
  icdar2019_mlt: 0.0
  evarest: 0.0
  totaltext: 0.0
  ctw1500: 0.0
  textocr: 0.0
  ir_lpr: 0.0
  min_ptdr_fraction: 0.3

mlt:
  scripts:
    - Arabic
    - Latin

mmocr:
  base_config: dbnetpp_resnet50-dcnv2_fpnc_1200e_icdar2015.py
  load_from: null

training:
  work_dir: work_dirs/dbnetpp_ptdr_scene
  seed: 42
  batch_size: 8
  eval_batch_size: 1
  num_workers: 8
  pin_memory: true
  prefetch_factor: 2
  cudnn_benchmark: true
  max_epochs: 100
  val_interval: 5
  amp: true
  logger_interval: 50
  checkpoint_interval: 1
  max_keep_ckpts: 3

wandb:
  enabled: true
  mode: online
  project: ptdr-ocr
  entity: null
  group: dbnetpp
  job_type: train
  run_name: null
  tags:
    - ptdr
    - dbnetpp
    - detection
